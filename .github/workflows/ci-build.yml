name: Build Validation

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Verify pyproject.toml
        run: |
          pip install build
          python -m build --sdist --no-isolation 2>&1 | tail -5